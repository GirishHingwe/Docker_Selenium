version: '3.8'
networks:
  selenium-network:
    driver: bridge

services:

  jenkins:
    build: Jenkins_Run_Selenium
    container_name: myjenkins-blueocean:latest
    ports:
      - "8080:8080"
      - "50000:50000"

    networks:
      - selenium-network

    volumes:
      - jenkins_home:/var/jenkins_home
      - ./:/workspace

    depends_on:
      - selenium-hub

  selenium-hub:
    image: selenium/hub:4.34.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
    networks:
      - selenium-network

  chrome:
    image: selenium/node-chrome:4.34.0
    shm_size: 2gb

    depends_on:
      - selenium-hub
    networks:
      - selenium-network
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  firefox:
    image: selenium/node-firefox:4.34.0
    shm_size: 2gb

    depends_on:
      - selenium-hub
    networks:
      - selenium-network

    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

volumes:
  jenkins_home: